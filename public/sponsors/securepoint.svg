            <text x="20" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="4" font-weight="900" fill="#ffffff">SECURE-POINT</text>
        </g>
        <text x="80" y="54%" dominant-baseline="middle" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="900" fill="#000000" letter-spacing="1">SECURE-POINT</text>
